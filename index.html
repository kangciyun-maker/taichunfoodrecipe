<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="robots" content="noindex, nofollow">

<title>太春行素食訂貨系統</title>
<style>
/* 基礎設定 */
body {
    font-family: Arial, "Microsoft JhengHei", sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 8px;
    font-size: 20px; /* 回復原本的字體大小 */
}
.container {
    max-width: 100%;
    margin: auto;
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-sizing: border-box;
}
h1 {
    text-align: center;
    font-size: 28px;
    margin-bottom: 10px;
}
.company-info {
    text-align: center;
    margin-bottom: 20px;
    line-height: 1.6;
    font-size: 18px;
}
.company-info p { margin: 5px 0; }

/* 說明區塊 */
.notice {
    background: #fff8e1;
    border: 1px solid #ffd54f;
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 20px;
    line-height: 1.6;
    font-size: 18px;
}
.red { color: red; font-weight: bold; }
.notice ol { margin: 8px 0 0 20px; padding: 0; }
.notice li { margin: 6px 0; }

/* 🌟 日期選擇區：回復原本字體大小，純加上漂亮的藍色框框 🌟 */
.date-section {
    background: #e8f0fe;
    border: 2px dashed #2d7ef7; /* 藍色虛線邊框 */
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 20px; /* 回復原本字體大小 */
}
.date-section p { margin: 8px 0; }
select {
    font-size: 20px; /* 回復原本字體大小 */
    padding: 5px;
    border-radius: 6px;
    border: 1px solid #2d7ef7;
    background: white;
}

/* 核心改版：拋棄 Table，改用手機彈性卡片排列 */
.product-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}
.product-item {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 12px;
    display: flex;
    flex-wrap: wrap; /* 精髓：字體太大時會自動換行，絕不擠壓 */
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: background 0.2s;
}
/* 當被勾選時，卡片背景變淡藍色，方便長輩辨識 */
.product-item.selected {
    background: #e8f0fe;
    border-color: #1a73e8;
}
.product-label {
    display: flex;
    align-items: center;
    font-weight: bold;
    min-width: 140px; /* 保證品名有一定寬度 */
    flex: 1 1 auto;
}
input[type="checkbox"] {
    transform: scale(1.4); /* 放大勾選框，好按 */
    margin-right: 12px;
}
.input-group {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 2 1 200px; /* 讓輸入框佔據剩餘的所有空間，最少有 200px 寬 */
    width: 100%;
}
input[type="text"] {
    width: 100%;
    padding: 12px;
    font-size: 20px;
    box-sizing: border-box;
    border: 1px solid #dadce0;
    border-radius: 8px;
    background: #fff;
}
input[type="text"]:focus {
    outline: none;
    border-color: #1a73e8;
    box-shadow: 0 0 0 2px rgba(26,115,232,.15);
}
.unit {
    font-weight: bold;
    color: #555;
    white-space: nowrap;
}

/* 備註與按鈕 */
textarea {
    width: 100%;
    padding: 10px;
    font-size: 20px;
    box-sizing: border-box;
    border: 1px solid #dadce0;
    border-radius: 8px;
}
button {
    width: 100%;
    padding: 18px;
    font-size: 22px;
    background: #2d7ef7;
    color: white;
    border: none;
    border-radius: 10px;
    margin-top: 15px;
    cursor: pointer;
    font-weight: bold;
}
.modify-btn { background: #6c757d; margin-bottom: 10px; }
.result { white-space: pre-wrap; background: #f0f0f0; padding: 15px; margin-top: 15px; font-size: 18px; }
#confirmArea { margin-top: 20px; border: 2px dashed #2d7ef7; padding: 15px; border-radius: 10px; background: #fdfdfd; }
</style>
</head>
<body>

<div id="formContainer" class="container">

<h1>太春行素食訂貨單</h1>

<div class="company-info">
    <p><strong>電話：</strong>03-5336901</p>
    <p><strong>地址：</strong>新竹市東區復中里經國路一段379巷10弄23號1樓</p>
</div>

<div class="notice">
<b>訂購說明</b>
<ol>
    <li>請先勾選欲購買的商品後再填寫數量，<span class="red">未勾選之商品將不列入訂單。</span></li>
    <li>如需訂購表單未列出的商品，<span class="red">請於備註欄註明商品名稱及數量。</span></li>
    <li>如有特殊需求、備註事項或其他說明，<span class="red">請於備註欄詳細說明。</span></li>
    <li>同一商品分裝可使用「+」填寫數量，例如：2+4。不同商品需分裝時，<span class="red">請分別下單。</span></li>
</ol>
</div>

<div class="date-section">
    <p>訂貨日期：<span id="orderDate" style="font-weight:bold; color:#1a73e8;"></span></p>
    <p>交貨日期：<select id="deliveryDate"></select></p>
    <p style="color:red;font-weight:bold;margin:8px 0 0 0;font-size:18px;">※ 請確認交貨日期後再送出訂單!!</p>
</div>

<div class="product-list" id="productContainer">
    </div>

<br>
<b>備註：</b>
<textarea id="note" rows="4"></textarea>

<button id="checkOrderBtn" onclick="reviewOrder()">確認清單</button>

<div id="confirmArea" style="display:none;">
    <h3 style="color:#2d7ef7;margin-top:0;">請確認您的訂購清單：</h3>
    <pre class="result" id="output"></pre>
    <button class="modify-btn" onclick="modifyOrder()">修改訂單</button>
    
    <button id="sendOrderBtn" onclick="sendOrderToServer()" style="display: flex; align-items: center; justify-content: center; gap: 10px;">
        <span id="spinner" style="display: none; width: 20px; height: 20px; border: 3px solid #ffffff; border-top: 3px solid transparent; border-radius: 50%; animation: spin 1s linear infinite;"></span>
        <span id="btnText">送出訂單</span>
    </button>
</div>

<style>
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>

</div>

<script>
const products = [
    ["豆干(小干)","斤"],["切豆干","斤"],["碎干","斤"],["干丁","斤"],["胖干","斤"],["包干","斤"],["條干","斤"],["四分干","斤"],["大印干","斤"],["非改小干","斤"],["非改小白干","斤"],["非改包干","斤"],["素雞","斤"],["切素雞","斤"],["豆腸","斤"],["麵腸","斤"],["切麵腸","斤"],["大干絲","斤"],["白干絲","斤"],["素肚","斤"],["小豆包","斤"],["大豆包","斤"],["炸豆包","斤"],["大麵輪","斤"],["大三角","斤"],["小三角","斤"],["大四角","斤"],["小四角","斤"],["花生","斤"],["海捲","斤"],["海龍","斤"],["海結","斤"],["南大干","包"],["大黑干(大干)","包"],["大梅花","包"],["百頁豆腐","包"],["大臭豆腐","包"],["小臭豆腐","包"],["大豆漿","包"],["小豆漿","包"],["真空黑干","串"],["豆腐","板"],["雞蛋豆腐","盒"],["中華嫩豆腐","盒"],["大漢板豆腐(大)","盒"],["大漢板豆腐(小)","盒"],["大漢嫩豆腐","盒"],["中港板豆腐","盒"],["春豐板豆腐","盒"],["三角中港油豆腐","盒"],["四角中港油豆腐","盒"],["小雞","隻"]
];

let finalOrderText = "";
let savedOrderData = {};
let customerId = "未辨識顧客"; 

function renderProducts() {
    const container = document.getElementById("productContainer");
    products.forEach((prod, index) => {
        const itemDiv = document.createElement("div");
        itemDiv.className = "product-item";
        itemDiv.id = `item_${index}`;
        
        itemDiv.onclick = function(e) {
            if(e.target.tagName !== 'INPUT') {
                const chk = this.querySelector('input[type="checkbox"]');
                chk.checked = !chk.checked;
                toggleHighlight(this, chk.checked);
            }
        };

        itemDiv.innerHTML = `
            <div class="product-label">
                <input type="checkbox" id="chk_${index}" onchange="toggleHighlight(this.closest('.product-item'), this.checked)">
                <label style="cursor:pointer;">${prod[0]}</label>
            </div>
            <div class="input-group">
                <input type="text" id="qty_${index}" placeholder="例：5、3+2" onclick="event.stopPropagation();">
                <span class="unit">${prod[1]}</span>
            </div>
        `;
        container.appendChild(itemDiv);
    });
}

function toggleHighlight(element, isChecked) {
    if(isChecked) {
        element.classList.add("selected");
    } else {
        element.classList.remove("selected");
    }
}

function getCustomerFromUrl() {
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.has('id')) {
        customerId = urlParams.get('id');
    }
}

function createDates(){
    const today = new Date();
    let month = String(today.getMonth()+1).padStart(2,'0');
    let day = String(today.getDate()).padStart(2,'0');
    document.getElementById("orderDate").innerText = `${month}/${day}`;
    const select = document.getElementById("deliveryDate");
    for(let i=0;i<7;i++){
        let d = new Date();
        d.setDate(today.getDate()+i);
        let m = String(d.getMonth()+1).padStart(2,'0');
        let da = String(d.getDate()).padStart(2,'0');
        let option = document.createElement("option");
        option.value = `${m}/${da}`;
        option.text = `${m}/${da}`;
        select.appendChild(option);
    }
}

function reviewOrder(){
    const orderDate = document.getElementById("orderDate").innerText;
    const deliveryDate = document.getElementById("deliveryDate").value;
    const note = document.getElementById("note").value;

    let result = "【太春行素食新訂單】\n\n"; 
    result += "交貨日期：" + deliveryDate + "\n\n";
    result += "訂單內容：\n";

    let itemsOnlyText = ""; 
    let hasItems = false;
    
    products.forEach((prod, index) => {
        const checkbox = document.getElementById(`chk_${index}`);
        const qtyInput = document.getElementById(`qty_${index}`);
        if(checkbox && qtyInput) {
            const qty = qtyInput.value.trim();
            if(checkbox.checked && qty !== ""){
                // 🌟 這裡修改：商品名稱與數量中間完全使用「空格」隔開，拿掉冒號了！
                itemsOnlyText += `${prod[0]} ${qty}${prod[1]}\n`;
                hasItems = true;
            }
        }
    });

    result += itemsOnlyText === "" ? "（未勾選商品）\n" : itemsOnlyText;
    result += "\n備註事項：" + (note.trim() !== "" ? note : "無備註");

    if(!hasItems && note.trim() === ""){
        alert("您尚未勾選任何商品或填寫備註唷！");
        return;
    }

    finalOrderText = itemsOnlyText.trim(); 
    savedOrderData = { orderDate, deliveryDate, note };
    document.getElementById("output").innerText = result;
    document.getElementById("confirmArea").style.display = "block";
    document.getElementById("confirmArea").scrollIntoView({ behavior: 'smooth' });
}

function modifyOrder() {
    document.getElementById("confirmArea").style.display = "none";
    window.scrollTo({ top: document.getElementById("productContainer").offsetTop, behavior: 'smooth' });
}

function sendOrderToServer(){
    const btn = document.getElementById("sendOrderBtn");
    const spinner = document.getElementById("spinner");
    const btnText = document.getElementById("btnText");

    btn.disabled = true;
    btn.style.background = "#a0c5fc";
    spinner.style.display = "inline-block";
    btnText.innerText = "送單中，請稍後...";

    const latestGasUrl = "https://script.google.com/macros/s/AKfycbzd_V8VXFnMP1yepbDve2wUZKe9QNXjbPEllQnHzYvAfgcPvNW_teeNKKSw_u0ux7FL4g/exec";

    fetch(latestGasUrl, {
        method: "POST",
        body: JSON.stringify({
            id: customerId, 
            deliveryTime: savedOrderData.deliveryDate, 
            items: finalOrderText, 
            memo: savedOrderData.note 
        })
    })
    .then(response => response.json())
    .then(data => {
        alert("訂單已送出，感謝您的訂購!");
        
        document.getElementById("confirmArea").style.display = "none";
        document.getElementById("note").value = "";
        
        products.forEach((prod, index) => {
            const checkbox = document.getElementById(`chk_${index}`);
            const qtyInput = document.getElementById(`qty_${index}`);
            const itemDiv = document.getElementById(`item_${index}`);
            if (checkbox) checkbox.checked = false;
            if (qtyInput) qtyInput.value = "";
            if (itemDiv) itemDiv.classList.remove("selected");
        });
        
        btn.disabled = false;
        btn.style.background = "#2d7ef7";
        spinner.style.display = "none";
        btnText.innerText = "送出訂單";
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    })
    .catch(error => {
        alert("送出失敗，請檢查網路或再試一次！");
        console.log(error);
        btn.disabled = false;
        btn.style.background = "#2d7ef7";
        spinner.style.display = "none";
        btnText.innerText = "送出訂單";
    });
}

renderProducts();
createDates();
getCustomerFromUrl();
</script>
</body>
</html>
