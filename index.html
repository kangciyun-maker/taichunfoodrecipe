<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太春行素食訂貨系統</title>
<style>
/* 基礎設定 */
body {
    font-family: Arial, "Microsoft JhengHei", sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 8px;
    font-size: 20px; /* 回復原本的字體大小 */
}
.container {
    max-width: 100%;
    margin: auto;
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-sizing: border-box;
}
h1 {
    text-align: center;
    font-size: 28px;
    margin-bottom: 10px;
}
.company-info {
    text-align: center;
    margin-bottom: 20px;
    line-height: 1.6;
    font-size: 18px;
}
.company-info p { margin: 5px 0; }

/* 說明區塊 */
.notice {
    background: #fff8e1;
    border: 1px solid #ffd54f;
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 20px;
    line-height: 1.6;
    font-size: 18px;
}
.red { color: red; font-weight: bold; }
.notice ol { margin: 8px 0 0 20px; padding: 0; }
.notice li { margin: 6px 0; }

/* 🌟 日期選擇區：回復原本字體大小，純加上漂亮的藍色框框 🌟 */
.date-section {
    background: #e8f0fe;
    border: 2px dashed #2d7ef7; /* 藍色虛線邊框 */
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 20px; /* 回復原本字體大小 */
}
.date-section p { margin: 8px 0; }
select {
    font-size: 20px; /* 回復原本字體大小 */
    padding: 5px;
    border-radius: 6px;
    border: 1px solid #2d7ef7;
    background: white;
}

/* 核心改版：拋棄 Table，改用手機彈性卡片排列 */
.product-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}
.product-item {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 12px;
    display: flex;
    flex-wrap: wrap; /* 精髓：字體太大時會自動換行，絕不擠壓 */
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: background 0.2s;
}
/* 當被勾選時，卡片背景變淡藍色，方便長輩辨識 */
.product-item.selected {
    background: #e8f0fe;
    border-color: #1a73e8;
}
.product-label {
    display: flex;
    align-items: center;
    font-weight: bold;
    min-width: 140px; /* 保證品名有一定寬度 */
    flex: 1 1 auto;
}
input[type="checkbox"] {
    transform: scale(1.4); /* 放大勾選框，好按 */
    margin-right: 12px;
}
.input-group {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 2 1 200px; /* 讓輸入框佔據剩餘的所有空間，最少有 200px 寬 */
    width: 100%;
}
input[type="text"] {
    width: 100%;
    padding: 12px;
    font-size: 20px;
    box-sizing: border-box;
    border: 1px solid #dadce0;
    border-radius: 8px;
    background: #fff;
}
input[type="text"]:focus {
    outline: none;
    border-color: #1a73e8;
    box-shadow: 0 0 0 2px rgba(26,115,232,.15);
}
.unit {
    font-weight: bold;
    color: #555;
    white-space: nowrap;
}
